<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="controles">
    <label for="pendiente">Pendiente</label>
    <input type="range" id="pendiente" min="0" max="100" value="20">
    <span id="valor">20%</span>
    <label class="arrancar">
      <input type="checkbox" id="arrancar">
      Arrancar
    </label>
    <label class="freno-mano">
      <input type="checkbox" id="frenoMano" checked>
      Freno de mano
    </label>
    <div class="gear-selector">
      <span class="gear-label">Marcha:</span>
      <label class="gear-btn"><input type="radio" name="marcha" value="N" checked disabled><span>N</span></label>
      <label class="gear-btn"><input type="radio" name="marcha" value="1" disabled><span>1</span></label>
      <label class="gear-btn"><input type="radio" name="marcha" value="2" disabled><span>2</span></label>
      <label class="gear-btn"><input type="radio" name="marcha" value="3" disabled><span>3</span></label>
      <label class="gear-btn"><input type="radio" name="marcha" value="4" disabled><span>4</span></label>
      <label class="gear-btn"><input type="radio" name="marcha" value="5" disabled><span>5</span></label>
    </div>
  </div>
  <div class="cuadrado">
    <div id="cockpit">
      <svg id="gauge" viewBox="0 0 480 220" width="480" height="220"></svg>
    </div>
    <div class="triangulo" id="triangulo"></div>
    <svg id="caja" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 40" width="320" height="160">
      <!-- Carrocería (grupo que tiembla con el motor) -->
      <g id="carroceria">
        <path d="M4,26 L4,18 L13,18 L20,7 L50,7 L58,18 L75,18 L75,26 Z" fill="#e74c3c"/>
        <rect x="4" y="24" width="71" height="4" rx="1" fill="#c0392b"/>
        <path d="M22,17 L27,9 L50,9 L56,17 Z" fill="#85c1e9" opacity="0.9"/>
        <rect x="36" y="9" width="2" height="8" fill="#c0392b"/>
        <ellipse cx="4" cy="21" rx="1.5" ry="3" fill="#fff9c4"/>
        <rect x="73" y="19" width="3" height="6" rx="1" fill="#ef5350"/>
        <line x1="37" y1="18" x2="36" y2="26" stroke="#c0392b" stroke-width="1.5" opacity="0.7"/>
        <rect x="43" y="20" width="5" height="2" rx="1" fill="#a93226"/>
      </g>
      <!-- Ruedas encima de la carrocería (no tiemblan) -->
      <circle cx="16" cy="31" r="9" fill="#111"/>
      <g id="wf">
        <circle cx="16" cy="31" r="6.5" fill="#222"/>
        <line x1="16" y1="31" x2="16"    y2="24.5" stroke="#666" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="16" y1="31" x2="22.18" y2="28.99" stroke="#666" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="16" y1="31" x2="19.82" y2="36.26" stroke="#666" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="16" y1="31" x2="12.18" y2="36.26" stroke="#666" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="16" y1="31" x2="9.82"  y2="28.99" stroke="#666" stroke-width="1.2" stroke-linecap="round"/>
        <circle cx="16" cy="31" r="2.5" fill="#777"/>
        <circle cx="16" cy="31" r="1"   fill="#333"/>
      </g>
      <circle cx="62" cy="31" r="9" fill="#111"/>
      <g id="wr">
        <circle cx="62" cy="31" r="6.5" fill="#222"/>
        <line x1="62" y1="31" x2="62"    y2="24.5" stroke="#666" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="62" y1="31" x2="68.18" y2="28.99" stroke="#666" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="62" y1="31" x2="65.82" y2="36.26" stroke="#666" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="62" y1="31" x2="58.18" y2="36.26" stroke="#666" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="62" y1="31" x2="55.82" y2="28.99" stroke="#666" stroke-width="1.2" stroke-linecap="round"/>
        <circle cx="62" cy="31" r="2.5" fill="#777"/>
        <circle cx="62" cy="31" r="1"   fill="#333"/>
      </g>
    </svg>
  </div>
  <script src="script.js"></script>
</body>
</html>
