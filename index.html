<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="controles">
    <button id="btnArduino" style="padding: 8px 12px; cursor: pointer; background: #ff9800; color: white; border: none; border-radius: 4px; font-weight: bold;">Conectar Arduino</button>
    <label for="pendiente">Pendiente</label>
    <input type="range" id="pendiente" min="0" max="100" value="0">
    <span id="valor">0%</span>
    <input type="checkbox" id="arrancar" style="display:none">
    <input type="checkbox" id="frenoMano" checked style="display:none">
    <label class="motor-electrico">
      <input type="checkbox" id="motorElectrico">
      Motor eléctrico
    </label>
  </div>
  <div class="cuadrado">
    <div id="stall-message">¡SE TE HA CALADO!</div>
    <div id="handbrake-message">¡QUITA EL FRENO DE MANO!</div>
    <div id="brakeaccel-message">¡NO PISES FRENO Y ACELERADOR A LA VEZ!</div>
    <div id="clutch-message">PARA CAMBIAR DE MARCHA,<br>PISA EL EMBRAGUE</div>
    <div id="cockpit">
      <svg id="gauge" viewBox="0 0 480 435" width="480" height="435"></svg>
    </div>
    <div id="pedals-container" style="position: absolute; top: 15px; left: 495px; z-index: 10;">
      <svg id="pedals-gauge" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 90 235" width="90" height="235">
        <defs>
          <pattern id="handbrake-pattern" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse">
            <rect width="6" height="6" fill="#ccc"/>
            <circle cx="3" cy="3" r="1.5" fill="#999"/>
          </pattern>
        </defs>
        <!-- Embrague (izquierda) -->
        <g id="clutch-bar">
          <rect x="5" y="10" width="24" height="200" fill="none" stroke="#666" stroke-width="1.5" rx="2"/>
          <rect id="clutch-fill" x="5" y="10" width="24" height="200" fill="#4a90e2" rx="2"/>
          <text x="17" y="110" text-anchor="middle" dominant-baseline="middle" transform="rotate(-90, 17, 110)" font-size="18" fill="#666" font-family="Arial" font-weight="bold" pointer-events="none">EMBRAGUE</text>
          <text id="clutch-val" x="17" y="225" text-anchor="middle" font-size="10" fill="#666" font-family="Arial">0%</text>
        </g>
        <!-- Freno (centro) -->
        <rect x="33" y="10" width="24" height="200" fill="none" stroke="#666" stroke-width="1.5" rx="2"/>
        <rect id="brake-fill" x="33" y="10" width="24" height="200" fill="#e74c3c" rx="2"/>
        <rect id="handbrake-overlay" x="33" y="10" width="24" height="200" fill="url(#handbrake-pattern)" rx="2" display="none"/>
        <text x="45" y="110" text-anchor="middle" dominant-baseline="middle" transform="rotate(-90, 45, 110)" font-size="18" fill="#666" font-family="Arial" font-weight="bold" pointer-events="none">FRENO</text>
        <text id="handbrake-icon" x="45" y="60" text-anchor="middle" dominant-baseline="middle" font-size="22" fill="#c0392b" font-family="Arial" font-weight="bold" display="none">!</text>
        <text id="brake-val" x="45" y="225" text-anchor="middle" font-size="10" fill="#666" font-family="Arial">0%</text>
        <!-- Acelerador (derecha) -->
        <rect x="61" y="10" width="24" height="200" fill="none" stroke="#666" stroke-width="1.5" rx="2"/>
        <rect id="accel-fill" x="61" y="10" width="24" height="200" fill="#2ecc71" rx="2"/>
        <text x="73" y="110" text-anchor="middle" dominant-baseline="middle" transform="rotate(-90, 73, 110)" font-size="18" fill="#666" font-family="Arial" font-weight="bold" pointer-events="none">ACELERADOR</text>
        <text id="accel-val" x="73" y="225" text-anchor="middle" font-size="10" fill="#666" font-family="Arial">0%</text>
      </svg>
    </div>
    <div class="triangulo" id="triangulo"></div>
    <div id="calle" style="position:absolute;bottom:0;left:0;width:100%;height:18px;background:#555;z-index:0;display:none;">
      <svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
        <line x1="0" y1="9" x2="100%" y2="9" stroke="white" stroke-width="3" stroke-dasharray="30,20"/>
      </svg>
    </div>
    <svg id="ciudad-svg" xmlns="http://www.w3.org/2000/svg" style="position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;display:none;overflow:hidden;pointer-events:none;"></svg>
    <svg id="caja" xmlns="http://www.w3.org/2000/svg" viewBox="-4 0 84 40" width="320" height="160">
      <!-- Tubo de escape (capa más inferior, se dibuja primero) -->
      <rect x="2" y="25" width="6" height="2.5" rx="1" fill="#333"/>
      <rect x="2" y="25.5" width="2" height="1.5" rx="0.5" fill="#222"/>
      <!-- Partículas de humo (capa inferior) -->
      <g id="humo"></g>
      <!-- Carrocería (grupo que tiembla con el motor) -->
      <g id="carroceria">
        <path d="M4,26 L4,18 L13,18 L20,7 L50,7 L58,18 L75,18 L75,26 Z" fill="#e74c3c"/>
        <rect x="4" y="24" width="71" height="4" rx="1" fill="#c0392b"/>
        <path d="M22,17 L27,9 L50,9 L56,17 Z" fill="#85c1e9" opacity="0.9"/>
        <rect x="36" y="9" width="2" height="8" fill="#c0392b"/>
        <ellipse cx="4" cy="21" rx="1.5" ry="3" fill="#ef5350"/>
        <rect x="73" y="19" width="3" height="6" rx="1" fill="#fff9c4"/>
        <line x1="37" y1="18" x2="36" y2="26" stroke="#c0392b" stroke-width="1.5" opacity="0.7"/>
        <rect x="43" y="20" width="5" height="2" rx="1" fill="#a93226"/>
      </g>
      <!-- Ruedas encima de la carrocería (no tiemblan) -->
      <circle cx="16" cy="31" r="9" fill="#111"/>
      <g id="wf">
        <circle cx="16" cy="31" r="6.5" fill="#222"/>
        <line x1="16" y1="31" x2="16"    y2="24.5" stroke="#666" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="16" y1="31" x2="22.18" y2="28.99" stroke="#666" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="16" y1="31" x2="19.82" y2="36.26" stroke="#666" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="16" y1="31" x2="12.18" y2="36.26" stroke="#666" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="16" y1="31" x2="9.82"  y2="28.99" stroke="#666" stroke-width="1.2" stroke-linecap="round"/>
        <circle cx="16" cy="31" r="2.5" fill="#777"/>
        <circle cx="16" cy="31" r="1"   fill="#333"/>
      </g>
      <circle cx="62" cy="31" r="9" fill="#111"/>
      <g id="wr">
        <circle cx="62" cy="31" r="6.5" fill="#222"/>
        <line x1="62" y1="31" x2="62"    y2="24.5" stroke="#666" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="62" y1="31" x2="68.18" y2="28.99" stroke="#666" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="62" y1="31" x2="65.82" y2="36.26" stroke="#666" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="62" y1="31" x2="58.18" y2="36.26" stroke="#666" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="62" y1="31" x2="55.82" y2="28.99" stroke="#666" stroke-width="1.2" stroke-linecap="round"/>
        <circle cx="62" cy="31" r="2.5" fill="#777"/>
        <circle cx="62" cy="31" r="1"   fill="#333"/>
      </g>
    </svg>
  </div>
  <div id="fondo-inferior"></div>
  <script src="script.js"></script>
</body>
</html>
