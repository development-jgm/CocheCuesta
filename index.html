<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="controles">
    <label for="pendiente">Pendiente</label>
    <input type="range" id="pendiente" min="0" max="100" value="100">
    <span id="valor">100%</span>
    <label class="freno-mano">
      <input type="checkbox" id="frenoMano" checked>
      Freno de mano
    </label>
  </div>
  <div class="cuadrado">
    <div id="cockpit">
      <svg id="gauge" viewBox="0 0 240 220" width="240" height="220"></svg>
    </div>
    <div class="triangulo" id="triangulo"></div>
    <svg id="caja" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 40" width="160" height="80">
      <!-- Carrocería -->
      <path d="M4,26 L4,18 L13,18 L20,7 L50,7 L58,18 L75,18 L75,26 Z" fill="#e74c3c"/>
      <rect x="4" y="24" width="71" height="4" rx="1" fill="#c0392b"/>
      <!-- Luneta y parabrisas -->
      <path d="M22,17 L27,9 L50,9 L56,17 Z" fill="#85c1e9" opacity="0.9"/>
      <!-- Pilar B -->
      <rect x="36" y="9" width="2" height="8" fill="#c0392b"/>
      <!-- Rueda delantera (izq = frente) -->
      <circle cx="16" cy="31" r="9" fill="#111"/>
      <circle cx="16" cy="31" r="5.5" fill="#3a3a3a"/>
      <circle cx="16" cy="31" r="2" fill="#999"/>
      <!-- Rueda trasera -->
      <circle cx="62" cy="31" r="9" fill="#111"/>
      <circle cx="62" cy="31" r="5.5" fill="#3a3a3a"/>
      <circle cx="62" cy="31" r="2" fill="#999"/>
      <!-- Faro -->
      <ellipse cx="4" cy="21" rx="1.5" ry="3" fill="#fff9c4"/>
      <!-- Piloto trasero -->
      <rect x="73" y="19" width="3" height="6" rx="1" fill="#ef5350"/>
      <!-- Línea de puerta -->
      <line x1="37" y1="18" x2="36" y2="26" stroke="#c0392b" stroke-width="1.5" opacity="0.7"/>
      <!-- Manilla -->
      <rect x="43" y="20" width="5" height="2" rx="1" fill="#a93226"/>
    </svg>
  </div>
  <script src="script.js"></script>
</body>
</html>
